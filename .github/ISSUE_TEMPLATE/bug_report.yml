name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Upload a ... file
        3. Click ...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 126 on Windows 11
    validations:
      required: true
  - type: input
    id: format
    attributes:
      label: Image format involved
      placeholder: e.g. HEIC, PNG with transparency
  - type: checkboxes
    id: privacy
    attributes:
      label: Confirmation
      options:
        - label: I did not upload any sensitive file to this issue.
          required: true
