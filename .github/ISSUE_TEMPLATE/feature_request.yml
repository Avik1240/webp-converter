name: Feature request
description: Suggest an idea
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: checkboxes
    id: principles
    attributes:
      label: Alignment
      options:
        - label: This keeps the core converter free, unlimited, and client-side (no required uploads).
          required: true
